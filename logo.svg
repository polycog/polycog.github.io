<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pentagon outline -->
  <polygon points="20,4 34.3,14.4 28.8,31.6 11.2,31.6 5.7,14.4"
           stroke="#7B2FBE" stroke-width="1.1" fill="none" stroke-opacity=".45"/>

  <!-- Spokes: center → each vertex -->
  <line x1="20" y1="20" x2="20"   y2="4"    stroke="#C47D20" stroke-width="1"   stroke-opacity=".55"/>
  <line x1="20" y1="20" x2="34.3" y2="14.4" stroke="#C47D20" stroke-width="1"   stroke-opacity=".55"/>
  <line x1="20" y1="20" x2="28.8" y2="31.6" stroke="#C47D20" stroke-width="1"   stroke-opacity=".55"/>
  <line x1="20" y1="20" x2="11.2" y2="31.6" stroke="#C47D20" stroke-width="1"   stroke-opacity=".55"/>
  <line x1="20" y1="20" x2="5.7"  y2="14.4" stroke="#C47D20" stroke-width="1"   stroke-opacity=".55"/>

  <!-- Vertex nodes -->
  <circle cx="20"   cy="4"    r="2.2" stroke="#7B2FBE" stroke-width="1.1"/>
  <circle cx="34.3" cy="14.4" r="2.2" stroke="#7B2FBE" stroke-width="1.1" stroke-opacity=".55"/>
  <circle cx="28.8" cy="31.6" r="2.2" stroke="#7B2FBE" stroke-width="1.1" stroke-opacity=".55"/>
  <circle cx="11.2" cy="31.6" r="2.2" stroke="#7B2FBE" stroke-width="1.1" stroke-opacity=".55"/>
  <circle cx="5.7"  cy="14.4" r="2.2" stroke="#7B2FBE" stroke-width="1.1" stroke-opacity=".55"/>

  <!-- Central node (gold) -->
  <circle cx="20" cy="20" r="3.2" stroke="#C47D20" stroke-width="1.2"/>
  <circle cx="20" cy="20" r="1.4" fill="#C47D20" fill-opacity=".75"/>
</svg>
